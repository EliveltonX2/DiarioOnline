{% extends 'base.html' %}

{% block title %}Login - DiOn{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card card-custom p-4">
            <div class="text-center mb-4">
                <i class="fa-solid fa-book-open text-primary fa-3x mb-3"></i>
                <h3 class="font-weight-bold">Bem-vindo ao DiOn</h3>
                <p class="text-muted">Acesse sua conta</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                </div>
                
                <div class="mb-3">
                    <label for="id_password" class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg action-button">Entrar <i class="fa-solid fa-arrow-right ms-2"></i></button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <a href="{% url 'password_reset' %}" class="text-decoration-none text-muted">Esqueci minha senha</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
